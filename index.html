<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Arabic → English Live</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080a0d;--card:#0f1218;--border:#1c2130;
  --gold:#d4a853;--blue:#5ba3c9;--green:#3dd68c;
  --red:#e05c5c;--text:#e6e0d6;--dim:#3a4255;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(212,168,83,.07),transparent 60%),
             radial-gradient(ellipse 50% 40% at 90% 100%,rgba(91,163,201,.06),transparent 60%);
  pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;
  max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,14px) 0 env(safe-area-inset-bottom,0)}

/* TOP */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:700;color:var(--gold)}
.brand .ar{font-family:'Noto Naskh Arabic',serif;font-size:11px;color:var(--blue);direction:rtl;margin-top:1px}
.badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  border:1px solid var(--border);background:var(--card);font-size:9px;font-weight:700;
  letter-spacing:1.5px;color:var(--dim);transition:all .3s;white-space:nowrap}
.badge.on{border-color:rgba(61,214,140,.45);color:var(--green)}
.badge.busy{border-color:rgba(212,168,83,.45);color:var(--gold)}
.badge.err{border-color:rgba(224,92,92,.45);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge.on .dot{animation:pulse 1.3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* LANG SELECTOR */
.lang-row{display:flex;gap:6px;padding:0 16px 6px;flex-shrink:0;flex-wrap:wrap}
.lang-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);
  font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .2s}
.lang-btn.active{border-color:rgba(212,168,83,.5);color:var(--gold);background:rgba(212,168,83,.08)}
.lang-note{font-size:9px;color:var(--dim);padding:0 16px 4px;flex-shrink:0;line-height:1.4}

/* VIZ */
.viz-wrap{margin:0 16px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 12px 8px;flex-shrink:0}
.bars{display:flex;align-items:center;gap:2px;height:24px;margin-bottom:6px}
.b{flex:1;border-radius:2px;background:var(--blue);opacity:.18;height:3px;transition:height .06s,opacity .06s}
.b.on{opacity:.8}
.ar-live{font-family:'Noto Naskh Arabic',serif;font-size:15px;direction:rtl;text-align:right;
  color:rgba(212,168,83,.75);min-height:22px;line-height:1.5;word-break:break-word;max-height:48px;overflow:hidden}

/* DEBUG */
.debug-wrap{margin:0 16px 6px;flex-shrink:0}
.debug-box{background:#0a1a0a;border:1px solid #1a3a1a;border-radius:10px;
  padding:7px 10px;max-height:68px;overflow-y:auto;font-family:monospace;font-size:10px;
  color:#4ade80;line-height:1.55}
.debug-box::-webkit-scrollbar{display:none}
.dl{color:#4ade80}.dl.warn{color:#fbbf24}.dl.err{color:#f87171}.dl.info{color:#60a5fa}

/* TRANSLATION */
.trans-wrap{flex:1;margin:0 16px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel-hd{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.chip{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:5px;
  background:rgba(212,168,83,.12);color:var(--gold)}
.trans-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 10px}
.trans-scroll::-webkit-scrollbar{display:none}
#trans-text{font-size:20px;font-weight:300;line-height:1.65;color:var(--text);word-break:break-word;min-height:60px}
.ph{font-size:14px;color:var(--dim);font-weight:300}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cursor{display:inline-block;width:2px;height:.85em;background:var(--gold);
  margin-left:2px;vertical-align:middle;animation:blink .85s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* HISTORY */
.hist-wrap{margin:0 16px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;flex-shrink:0;max-height:20vh;display:flex;flex-direction:column}
.hist-hd{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.clr-btn{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:5px;
  background:rgba(91,163,201,.1);color:var(--blue);cursor:pointer;border:none;font-family:'Sora',sans-serif}
.hist-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.hist-list::-webkit-scrollbar{display:none}
.hi{padding:7px 12px;border-bottom:1px solid var(--border)}
.hi:last-child{border-bottom:none}
.hi-ar{font-family:'Noto Naskh Arabic',serif;font-size:12px;direction:rtl;text-align:right;color:var(--blue);line-height:1.5;margin-bottom:2px}
.hi-en{font-size:11px;color:var(--text);line-height:1.45;opacity:.8}
.hi-empty{padding:12px;font-size:11px;color:var(--dim);text-align:center}

/* CONTROLS */
.controls{flex-shrink:0;padding:4px 16px calc(env(safe-area-inset-bottom,0px) + 8px);display:flex;gap:8px}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:13px 8px;border-radius:13px;border:none;font-family:'Sora',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:transform .15s}
.btn:active{transform:scale(.95)}
.btn-go{background:linear-gradient(135deg,#1d5c3a,#3dd68c18);border:1px solid rgba(61,214,140,.4);color:var(--green)}
.btn-stop{background:linear-gradient(135deg,#5c1d1d,#e05c5c18);border:1px solid rgba(224,92,92,.4);color:var(--red);display:none}
.btn-clr{flex:0 0 46px;background:#0f1218;border:1px solid var(--border);color:var(--dim);border-radius:13px}
.err-bar{display:none;margin:0 16px 6px;padding:9px 12px;
  background:rgba(224,92,92,.08);border:1px solid rgba(224,92,92,.25);
  border-radius:10px;font-size:11px;color:var(--red);line-height:1.5;flex-shrink:0}
.foot{text-align:center;font-size:9px;letter-spacing:2px;color:#1e2535;padding:1px 0 3px;flex-shrink:0}
.foot b{color:rgba(212,168,83,.35)}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <h1>Arabic → English</h1>
      <div class="ar">مترجم فوري مباشر</div>
    </div>
    <div class="badge" id="badge"><div class="dot"></div><span id="badge-txt">IDLE</span></div>
  </div>

  <!-- Language variant picker -->
  <div class="lang-row" id="lang-row">
    <button class="lang-btn active" onclick="setLang('ar-AE','UAE/Gulf')">🇦🇪 Gulf</button>
    <button class="lang-btn" onclick="setLang('ar-SA','Saudi')">🇸🇦 Saudi</button>
    <button class="lang-btn" onclick="setLang('ar-EG','Egyptian')">🇪🇬 Egyptian</button>
    <button class="lang-btn" onclick="setLang('ar','Generic')">🌐 Generic AR</button>
  </div>
  <div class="lang-note" id="lang-note">▲ Pick the Arabic dialect closest to the speaker</div>

  <div class="viz-wrap">
    <div class="bars" id="bars"></div>
    <div class="ar-live" id="ar-live">…</div>
  </div>

  <div class="debug-wrap">
    <div class="debug-box" id="debug-box">
      <div class="dl info">[ Tap a dialect above, then Start Listening ]</div>
    </div>
  </div>

  <div class="trans-wrap">
    <div class="panel-hd">
      <span class="lbl">Live Translation</span>
      <span class="chip">EN</span>
    </div>
    <div class="trans-scroll" id="trans-scroll">
      <div id="trans-text"><span class="ph">Speak Arabic — translation streams here…</span></div>
    </div>
  </div>

  <div class="hist-wrap">
    <div class="hist-hd">
      <span class="lbl">History</span>
      <button class="clr-btn" onclick="clearHist()">CLEAR</button>
    </div>
    <div class="hist-list" id="hist-list"><div class="hi-empty">No phrases yet</div></div>
  </div>

  <div class="err-bar" id="err-bar"></div>

  <div class="controls">
    <button class="btn btn-go" id="btn-go" onclick="startListening()">🎙 Start Listening</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopListening()">⏹ Stop</button>
    <button class="btn btn-clr" onclick="clearAll()">↺</button>
  </div>

  <div class="foot"><b>SDMBRK COLLECTIONS</b></div>
</div>

<script>
// ── DEBUG ─────────────────────────────────────────────────────────
const dbx = document.getElementById('debug-box');
function log(msg, type='') {
  const d = document.createElement('div');
  d.className = 'dl'+(type?' '+type:'');
  const t = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent = t+' '+msg;
  dbx.appendChild(d);
  dbx.scrollTop = dbx.scrollHeight;
  while(dbx.children.length > 40) dbx.removeChild(dbx.firstChild);
}

// ── LANGUAGE ──────────────────────────────────────────────────────
let currentLang = 'ar-AE';
function setLang(code, label) {
  currentLang = code;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('lang-note').textContent = '✓ Using: '+label+' ('+code+')';
  log('Language set to '+code, 'info');
  // Restart if already listening
  if (isListening) { stopListening(); setTimeout(startListening, 400); }
}

// ── BARS ──────────────────────────────────────────────────────────
const barsEl = document.getElementById('bars');
const BC = 48;
const barEls = Array.from({length:BC},()=>{const b=document.createElement('div');b.className='b';barsEl.appendChild(b);return b;});
let audioCtx,analyser,micStream,raf;
async function startViz(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=128;src.connect(analyser);drawBars();
    log('Mic OK ✓','info');
  }catch(e){log('Mic: '+e.message,'warn');}
}
function drawBars(){
  raf=requestAnimationFrame(drawBars);
  if(!analyser)return;
  const d=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  barEls.forEach((b,i)=>{const v=d[Math.floor(i*d.length/BC)]||0;b.style.height=Math.max(3,(v/255)*22)+'px';b.classList.toggle('on',v>12);});
}
function stopViz(){
  cancelAnimationFrame(raf);
  barEls.forEach(b=>{b.style.height='3px';b.classList.remove('on');});
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close().catch(()=>{});
  audioCtx=analyser=micStream=null;
}

// ── STATE ─────────────────────────────────────────────────────────
let recognition=null,isListening=false,history=[];
let debTimer=null,isTranslating=false,lastSent='',pending='',fullFinal='';
const DEB=800;

// ── UI ────────────────────────────────────────────────────────────
function badge(type,txt){const b=document.getElementById('badge');b.className='badge'+(type?' '+type:'');document.getElementById('badge-txt').textContent=txt;}
function setAr(t){document.getElementById('ar-live').textContent=t||'…';}
function setEn(t){
  const el=document.getElementById('trans-text');
  if(!t){el.innerHTML='<span class="ph">Speak Arabic — translation streams here…</span>';return;}
  el.innerHTML=`<span style="animation:fadeUp .35s ease">${t}</span><span class="cursor"></span>`;
  document.getElementById('trans-scroll').scrollTop=9999;
}
function showErr(m){const e=document.getElementById('err-bar');e.textContent=m;e.style.display=m?'block':'none';}
function clearHist(){history=[];document.getElementById('hist-list').innerHTML='<div class="hi-empty">No phrases yet</div>';}
function clearAll(){clearHist();setEn('');setAr('');fullFinal='';lastSent='';pending='';dbx.innerHTML='<div class="dl info">[ Cleared ]</div>';}
function pushHist(ar,en){
  history.unshift({ar,en});
  document.getElementById('hist-list').innerHTML=history.slice(0,20).map(h=>
    `<div class="hi"><div class="hi-ar">${h.ar}</div><div class="hi-en">${h.en}</div></div>`
  ).join('');
}

// ── API ───────────────────────────────────────────────────────────
async function callAPI(arabic){
  log('→ Translating: "'+arabic.slice(0,25)+(arabic.length>25?'…':'')+'"','info');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:500,
      system:'You are a real-time Arabic-to-English interpreter. Translate the Arabic input to natural fluent English. Output ONLY the English translation — no explanation, no notes, no Arabic.',
      messages:[{role:'user',content:arabic}]
    })
  });
  if(!res.ok){const t=await res.text();log('API '+res.status+': '+t.slice(0,60),'err');throw new Error('HTTP '+res.status);}
  const data=await res.json();
  const eng=data?.content?.[0]?.text?.trim();
  if(eng) log('← "'+eng.slice(0,30)+(eng.length>30?'…':'')+'"');
  else log('Empty response','warn');
  return eng||null;
}

function schedule(arabic){
  pending=arabic;
  clearTimeout(debTimer);
  debTimer=setTimeout(()=>fire(arabic),DEB);
}

async function fire(arabic){
  if(!arabic||arabic===lastSent){return;}
  if(isTranslating){return;}
  isTranslating=true;lastSent=arabic;badge('busy','TRANSLATING');
  try{
    const eng=await callAPI(arabic);
    if(eng)setEn(eng);
    if(isListening)badge('on','LISTENING');
  }catch(e){
    log('Error: '+e.message,'err');
    showErr('Translation error — check internet.');
    badge('err','ERROR');
  }finally{
    isTranslating=false;
    if(pending!==lastSent)fire(pending);
  }
}

// ── SPEECH ───────────────────────────────────────────────────────
let noMatchCount = 0;
const LANGS_TO_TRY = ['ar-AE','ar-SA','ar-EG','ar-IQ','ar-MA','ar'];

function buildRec(lang){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){log('SpeechRecognition NOT supported','err');return null;}
  const r=new SR();
  r.lang=lang;
  r.continuous=true;
  r.interimResults=true;
  r.maxAlternatives=3; // get multiple alternatives — helps catch low-confidence matches

  r.onstart=()=>{log('Started lang='+lang);badge('on','LISTENING');showErr('');};
  r.onend=()=>{
    if(isListening){
      setTimeout(()=>{try{r.start();log('Restarted');}catch(e){log('Restart err: '+e.message,'err');}},250);
    }
  };
  r.onerror=(e)=>{
    log('SR error: '+e.error,'err');
    if(e.error==='not-allowed'||e.error==='denied'){
      showErr('Mic denied — tap the lock icon in address bar → Allow mic → try again.');
      badge('err','MIC DENIED');stopListening();
    }
    if(e.error==='no-speech'){log('(no speech detected — keep talking)','warn');}
  };
  r.onsoundstart=()=>log('🔊 Sound');
  r.onspeechstart=()=>log('🗣 Speech');
  r.onspeechend=()=>log('Speech ended');

  r.onnomatch=()=>{
    noMatchCount++;
    log('No match #'+noMatchCount+' (lang='+lang+')','warn');
    // After 2 no-matches, auto-switch to next dialect
    if(noMatchCount>=2){
      const idx=LANGS_TO_TRY.indexOf(currentLang);
      const next=LANGS_TO_TRY[(idx+1)%LANGS_TO_TRY.length];
      log('Auto-switching to '+next,'warn');
      currentLang=next;
      // Update button UI
      const labels={'ar-AE':'🇦🇪 Gulf','ar-SA':'🇸🇦 Saudi','ar-EG':'🇪🇬 Egyptian','ar-IQ':'🇮🇶 Iraqi','ar-MA':'🇲🇦 Moroccan','ar':'🌐 Generic'};
      document.getElementById('lang-note').textContent='Auto-switched to: '+(labels[next]||next);
      noMatchCount=0;
      // Restart with new lang
      if(recognition){try{recognition.stop();}catch(e){} recognition=null;}
      setTimeout(()=>{recognition=buildRec(currentLang);try{recognition.start();}catch(e){}},300);
    }
  };

  r.onresult=(event)=>{
    noMatchCount=0; // reset on success
    let interim='',newFinal='';
    log('onresult: '+event.results.length+' result(s)');
    for(let i=event.resultIndex;i<event.results.length;i++){
      // Try all alternatives
      let best='';
      for(let a=0;a<event.results[i].length;a++){
        const alt=event.results[i][a];
        log((event.results[i].isFinal?'FINAL':'interim')+' alt['+a+']: "'+alt.transcript+'" conf='+alt.confidence.toFixed(2));
        if(a===0)best=alt.transcript; // use best-ranked alternative
      }
      if(event.results[i].isFinal) newFinal+=best+' ';
      else interim+=best;
    }
    if(newFinal.trim()) fullFinal+=(fullFinal?' ':'')+newFinal.trim();
    const combined=(fullFinal+(interim?' '+interim:'')).trim();
    if(combined){setAr(combined);schedule(combined);}
    if(newFinal.trim()){
      const chunk=newFinal.trim();
      (async()=>{try{const e=await callAPI(chunk);if(e)pushHist(chunk,e);}catch(ex){}})();
    }
  };
  return r;
}

function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showErr('Use Chrome on Android or Safari on iPhone.');badge('err','NOT SUPPORTED');return;}
  fullFinal='';lastSent='';pending='';noMatchCount=0;
  isListening=true;
  recognition=buildRec(currentLang);
  try{recognition.start();}catch(e){log('Start err: '+e.message,'err');}
  startViz();
  document.getElementById('btn-go').style.display='none';
  document.getElementById('btn-stop').style.display='flex';
}

function stopListening(){
  isListening=false;clearTimeout(debTimer);
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  stopViz();badge('','IDLE');
  document.getElementById('btn-go').style.display='flex';
  document.getElementById('btn-stop').style.display='none';
  log('Stopped.');
}
</script>
</body>
</html>
