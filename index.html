<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TalkLine — Virtual Walkie Talkie</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #0d1208; --surface: #161c0f; --surface2: #1e2716; --border: #384529;
  --amber: #f5a623; --amber-dim: #7a4e0a; --amber-glow: rgba(245,166,35,0.25);
  --green: #5cb85c; --red: #e03c3c; --ptt: #ff5500; --ptt-glow: rgba(255,85,0,0.4);
  --text: #b8cc88; --text-dim: #586640;
  --mono: 'Share Tech Mono', monospace; --display: 'Orbitron', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--mono); background: var(--bg); color: var(--text); overscroll-behavior: none; }
body {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(60,90,20,0.06) 0%, transparent 60%),
    linear-gradient(rgba(50,70,20,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(50,70,20,0.04) 1px, transparent 1px);
  background-size: 100% 100%, 24px 24px, 24px 24px;
}

@keyframes fadeIn   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0.2} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes ringPulse{ 0%,100%{transform:scale(1);opacity:0.9} 50%{transform:scale(1.12);opacity:0.35} }

/* ── SETUP ─────────────────────────────────────────────────────────────── */
#setup { width:100%; max-width:400px; padding:20px; animation:fadeIn .4s ease; }

.logo-wrap { text-align:center; margin-bottom:32px; }
.logo { font-family:var(--display); font-size:2.6rem; font-weight:900; color:var(--amber);
  letter-spacing:.18em; text-shadow:0 0 40px rgba(245,166,35,.5),0 0 80px rgba(245,166,35,.2); line-height:1; }
.logo-sub { font-size:.65rem; color:var(--text-dim); letter-spacing:.4em; text-transform:uppercase; margin-top:6px; }

.panel { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:20px; margin-bottom:12px; position:relative; overflow:hidden; }
.panel::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(245,166,35,.3),transparent); }
.panel-title { font-family:var(--display); font-size:.58rem; color:var(--text-dim); letter-spacing:.3em; text-transform:uppercase; margin-bottom:14px; }

input[type="text"] {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:2px;
  color:var(--text); font-family:var(--mono); font-size:1rem; padding:10px 14px;
  outline:none; margin-bottom:10px; transition:border-color .2s,box-shadow .2s;
}
input[type="text"]:focus { border-color:var(--amber); box-shadow:0 0 12px var(--amber-glow); }
input[type="text"]::placeholder { color:var(--text-dim); }
.ch-input { font-size:1.1rem; letter-spacing:.1em; }
.input-hint { font-size:.6rem; color:var(--text-dim); letter-spacing:.08em; margin-top:-6px; margin-bottom:10px; }

.btn { width:100%; padding:12px; border:none; border-radius:2px; font-family:var(--display); font-size:.72rem; font-weight:700; letter-spacing:.18em; cursor:pointer; transition:all .15s; text-transform:uppercase; }
.btn:disabled { opacity:.45; cursor:default; }
.btn-primary  { background:var(--amber); color:#0d1208; }
.btn-primary:hover:not(:disabled) { background:#ffc040; box-shadow:0 0 24px var(--amber-glow); }
.btn-secondary{ background:var(--surface2); color:var(--text); border:1px solid var(--border); margin-top:8px; }
.btn-secondary:hover:not(:disabled) { border-color:var(--amber); color:var(--amber); }
.btn-primary:active:not(:disabled), .btn-secondary:active:not(:disabled) { transform:scale(.98); }

.or-div { text-align:center; color:var(--text-dim); font-size:.7rem; letter-spacing:.3em; margin:4px 0; }

/* saved profile */
.saved-profile { background:var(--surface2); border:1px solid var(--amber-dim); border-radius:2px; padding:10px 14px; margin-bottom:10px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:border-color .15s; }
.saved-profile:hover { border-color:var(--amber); }
.sp-info { flex:1; }
.sp-name { font-size:.9rem; color:var(--amber); }
.sp-ch   { font-size:.62rem; color:var(--text-dim); letter-spacing:.1em; margin-top:2px; }
.sp-arrow{ color:var(--text-dim); font-size:1.1rem; }

/* ── CONNECTING ─────────────────────────────────────────────────────────── */
#connecting { display:none; position:fixed; inset:0; background:var(--bg); z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
.spin-ring { width:48px;height:48px; border:2px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin .8s linear infinite; }
.conn-title { font-family:var(--display); font-size:.72rem; color:var(--amber); letter-spacing:.25em; animation:blink 1s infinite; }
.conn-sub   { font-size:.62rem; color:var(--text-dim); letter-spacing:.1em; }

/* ── APP ────────────────────────────────────────────────────────────────── */
#app { display:none; width:100%; max-width:460px; padding:14px; flex-direction:column; gap:10px; max-height:100vh; overflow-y:auto; animation:fadeIn .3s ease; }

.app-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:2px; }
.app-logo   { font-family:var(--display); font-size:1rem; font-weight:900; color:var(--amber); letter-spacing:.14em; }
.status-row { display:flex; align-items:center; gap:6px; font-size:.65rem; color:var(--text-dim); letter-spacing:.12em; }
.sdot       { width:7px;height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); flex-shrink:0; }
.sdot.warn  { background:var(--amber); box-shadow:0 0 8px var(--amber); animation:blink .8s infinite; }
.sdot.err   { background:var(--red);   box-shadow:0 0 8px var(--red); }

.room-bar   { background:var(--surface); border:1px solid var(--border); border-radius:2px; overflow:hidden; }
.room-inner { display:flex; align-items:center; }
.room-info  { flex:1; padding:10px 16px; }
.room-label { font-size:.55rem; color:var(--text-dim); letter-spacing:.3em; text-transform:uppercase; margin-bottom:3px; }
.room-code  { font-family:var(--display); font-size:1.2rem; font-weight:700; color:var(--amber); letter-spacing:.1em; word-break:break-all; }
.copy-btn   { padding:0 16px; min-height:56px; background:var(--surface2); border:none; border-left:1px solid var(--border); color:var(--text-dim); font-family:var(--mono); font-size:.68rem; cursor:pointer; transition:all .15s; white-space:nowrap; display:flex; align-items:center; gap:5px; }
.copy-btn:hover { color:var(--amber); }
.copy-btn.ok    { color:var(--green); }
.room-slot  { padding:5px 16px 8px; font-size:.6rem; color:var(--text-dim); letter-spacing:.1em; border-top:1px solid var(--border); }

.channel-tabs { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:2px; overflow:hidden; }
.ch-tab { flex:1; padding:9px 6px; border:none; background:none; font-family:var(--mono); font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); cursor:pointer; transition:all .15s; border-bottom:2px solid transparent; }
.ch-tab.active { color:var(--amber); background:var(--surface2); border-bottom-color:var(--amber); }

.members-box  { background:var(--surface); border:1px solid var(--border); border-radius:2px; overflow:hidden; }
.box-header   { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-bottom:1px solid var(--border); font-size:.58rem; color:var(--text-dim); letter-spacing:.25em; text-transform:uppercase; }
.members-list { max-height:190px; overflow-y:auto; }
.member-row   { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; transition:background .1s; border-bottom:1px solid rgba(56,69,41,.3); position:relative; }
.member-row:last-child { border-bottom:none; }
.member-row:hover { background:var(--surface2); }
.member-row.sel   { background:var(--surface2); border-left:2px solid var(--amber); }
.avatar  { width:30px;height:30px; border-radius:50%; border:1px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:.8rem; color:var(--amber); flex-shrink:0; position:relative; }
.av-ring { position:absolute; inset:-3px; border-radius:50%; border:2px solid var(--ptt); opacity:0; transition:opacity .15s; }
.member-row.tx .av-ring { opacity:1; animation:ringPulse .6s ease-in-out infinite; }
.m-name { flex:1; font-size:.82rem; }
.m-tag  { font-size:.6rem; color:var(--text-dim); letter-spacing:.1em; }
.m-tx   { font-size:.6rem; color:var(--ptt); letter-spacing:.12em; animation:blink .5s infinite; }
.empty-state { padding:20px; text-align:center; color:var(--text-dim); font-size:.72rem; letter-spacing:.1em; line-height:1.8; }

.ctrl-row { display:flex; gap:10px; align-items:stretch; }
.vox-card { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; transition:border-color .15s; }
.vox-card.on { border-color:var(--amber-dim); }
.sw      { width:34px;height:17px; background:var(--bg); border:1px solid var(--border); border-radius:9px; position:relative; flex-shrink:0; transition:background .2s; }
.sw-knob { position:absolute; top:2px;left:2px; width:11px;height:11px; background:var(--text-dim); border-radius:50%; transition:all .2s; }
.vox-card.on .sw      { background:var(--amber-dim); }
.vox-card.on .sw-knob { left:19px; background:var(--amber); }
.vox-label { font-size:.65rem; color:var(--text-dim); letter-spacing:.12em; text-transform:uppercase; }
.vox-card.on .vox-label { color:var(--amber); }

.level-meter { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:10px 12px; display:flex; align-items:center; gap:3px; }
.lb { width:4px;height:4px; background:var(--border); border-radius:1px; transition:height .05s,background .08s; }

.ptt-zone { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:20px 14px 24px; display:flex; flex-direction:column; align-items:center; gap:14px; }
.ptt-meta   { font-size:.6rem; color:var(--text-dim); letter-spacing:.25em; text-transform:uppercase; }
.ptt-target { font-family:var(--display); font-size:.75rem; color:var(--amber); letter-spacing:.15em; min-height:1.2em; text-align:center; }
.tx-badge   { font-family:var(--display); font-size:.65rem; color:var(--ptt); letter-spacing:.3em; text-shadow:0 0 12px var(--ptt); opacity:0; transition:opacity .1s; min-height:1em; }
.tx-badge.on{ opacity:1; animation:blink .4s infinite; }

.ptt-btn {
  width:150px;height:150px; border-radius:50%; border:3px solid var(--border);
  background:radial-gradient(circle at 38% 35%, var(--surface2), var(--bg) 80%);
  cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; user-select:none; -webkit-user-select:none; touch-action:none; position:relative;
  transition:all .08s;
  box-shadow:0 6px 30px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04),inset 0 -2px 6px rgba(0,0,0,.4);
}
.ptt-btn::before { content:''; position:absolute; inset:-10px; border-radius:50%; border:1px solid rgba(245,166,35,.08); transition:border-color .1s; }
.ptt-btn::after  { content:''; position:absolute; inset:-20px; border-radius:50%; border:1px solid rgba(245,166,35,.04); }
.ptt-btn.live { border-color:var(--ptt); background:radial-gradient(circle at 38% 35%,#281200,#150800 80%);
  box-shadow:0 0 50px var(--ptt-glow),0 0 100px rgba(255,85,0,.15),inset 0 2px 6px rgba(0,0,0,.5); transform:scale(.96); }
.ptt-btn.live::before { border-color:rgba(255,85,0,.3); }
.ptt-icon { font-size:2.8rem; line-height:1; pointer-events:none; }
.ptt-hint { font-family:var(--display); font-size:.52rem; letter-spacing:.22em; color:var(--text-dim); pointer-events:none; text-transform:uppercase; }
.ptt-btn.live .ptt-hint { color:var(--ptt); }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(70px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 18px; border-radius:2px; font-size:.78rem; letter-spacing:.08em; transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:999; white-space:nowrap; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar       { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo-wrap">
    <div class="logo">TALKLINE</div>
    <div class="logo-sub">Virtual Push-To-Talk</div>
  </div>
  <div id="saved-box"></div>
  <div class="panel">
    <div class="panel-title">Your Callsign</div>
    <input type="text" id="uname" placeholder="Your name…" maxlength="20" autocomplete="off">
  </div>
  <div class="panel">
    <div class="panel-title">Channel Name</div>
    <input type="text" id="ch-input" class="ch-input" placeholder="e.g. myteam, office, alpha…" maxlength="24"
      oninput="this.value=this.value.replace(/[^a-zA-Z0-9_-]/g,'').toLowerCase()">
      <button class="btn btn-primary" onclick="launch()">📡 Enter Channel</button>
    <button class="btn btn-secondary" onclick="genName()">🎲 Random Channel Name</button>
  </div>
</div>

<!-- CONNECTING -->
<div id="connecting">
  <div class="spin-ring"></div>
  <div class="conn-title" id="conn-title">CONNECTING</div>
  <div class="conn-sub"   id="conn-sub">Joining channel…</div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="app-logo">TALKLINE</div>
    <div class="status-row">
      <div class="sdot warn" id="sdot"></div>
      <span id="stext">ONLINE</span>
    </div>
  </div>

  <div class="room-bar">
    <div class="room-inner">
      <div class="room-info">
        <div class="room-label">Channel</div>
        <div class="room-code" id="r-code">──</div>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">📋 Invite</button>
    </div>
    <div class="room-slot" id="slot-info">Slot ─ / 8</div>
  </div>

  <div class="channel-tabs">
    <button class="ch-tab active" id="tab-grp" onclick="setMode('group')">📢 Group</button>
    <button class="ch-tab"        id="tab-ind" onclick="setMode('individual')">👤 Individual</button>
  </div>

  <div class="members-box">
    <div class="box-header">
      <span>Active Members</span>
      <span id="m-count">1 online</span>
    </div>
    <div class="members-list" id="m-list"></div>
  </div>

  <div class="ctrl-row">
    <div class="vox-card" id="vox-card" onclick="toggleVox()">
      <div class="sw"><div class="sw-knob"></div></div>
      <span class="vox-label">VOX Mode</span>
    </div>
    <div class="level-meter">
      <div class="lb" id="lb0"></div><div class="lb" id="lb1"></div><div class="lb" id="lb2"></div>
      <div class="lb" id="lb3"></div><div class="lb" id="lb4"></div>
    </div>
  </div>

  <div class="ptt-zone">
    <div class="ptt-meta">Transmit To</div>
    <div class="ptt-target" id="ptt-target">📢 ALL MEMBERS</div>
    <div class="tx-badge"   id="tx-badge">◉ TRANSMITTING</div>
    <div class="ptt-btn" id="ptt-btn"
      onmousedown="pttDown(event)" onmouseup="pttUp(event)" onmouseleave="pttUp(event)"
      ontouchstart="pttDown(event)" ontouchend="pttUp(event)" ontouchcancel="pttUp(event)">
      <div class="ptt-icon">🎙️</div>
      <div class="ptt-hint" id="ptt-hint">HOLD TO TALK</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════
const MAX_SLOTS  = 8;
const PREFIX     = 'tlv3';        // bump prefix avoids old-id collisions
const SCAN_MS    = 9000;
const LS_KEY     = 'talkline_v2';
const ADJECTIVES = ['alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel','india','juliet'];
const NUMBERS    = ['one','two','three','four','five','six','seven','eight'];

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let myName = '', roomCode = '', mySlot = -1;
let myPeer = null;
// slot index → { name, dc, oc, ic, audioEl, speaking, speakT }
const peers = {};

let localStream = null, silentStream = null, audioCtx = null, analyser = null;
let voxOn = false, talking = false, selSlot = null, voxHoldT = null;
let scanInterval = null, meterRunning = false;

const BARS = [0,1,2,3,4].map(i => document.getElementById('lb'+i));

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const sleep = ms => new Promise(r => setTimeout(r, ms));
const slotId = (code, n) => `${PREFIX}-${code.toLowerCase()}-s${n}`;

let _toastT;
function toast(msg, dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), dur);
}

function setStatus(text, state='ok') {
  document.getElementById('stext').textContent = text;
  document.getElementById('sdot').className = 'sdot' + (state==='ok' ? '' : state==='warn' ? ' warn' : ' err');
}

function setConn(title, sub) {
  document.getElementById('conn-title').textContent = title;
  document.getElementById('conn-sub').textContent   = sub;
}

function genName() {
  const a = ADJECTIVES[Math.floor(Math.random()*ADJECTIVES.length)];
  const n = NUMBERS   [Math.floor(Math.random()*NUMBERS.length)];
  document.getElementById('ch-input').value = a + n;
}

// ═══════════════════════════════════════════════════════════════════
//  SAVED PROFILE
// ═══════════════════════════════════════════════════════════════════
function loadSaved() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (!d || !d.name || !d.channel) return;
    document.getElementById('uname').value    = d.name;
    document.getElementById('ch-input').value = d.channel;
    const box = document.getElementById('saved-box');
    box.innerHTML = `<div class="saved-profile" onclick="launch()">
      <div class="sp-info">
        <div class="sp-name">${esc(d.name)}</div>
        <div class="sp-ch">📡 ${esc(d.channel)}</div>
      </div><div class="sp-arrow">▶ Quick Join</div>
    </div>`;
  } catch(e) {}
}

function saveProfile(name, ch) {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ name, channel: ch })); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════
//  LAUNCH
// ═══════════════════════════════════════════════════════════════════
async function launch() {
  const name = document.getElementById('uname').value.trim();
  const ch   = document.getElementById('ch-input').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  if (!name) { toast('⚠️ Enter your callsign first'); return; }
  if (!ch)   { toast('⚠️ Enter a channel name'); return; }
  myName = name; roomCode = ch;
  saveProfile(name, ch);

  document.getElementById('setup').style.display = 'none';
  document.getElementById('connecting').style.display = 'flex';
  setConn('JOINING', `Channel: ${ch}…`);

  await claimSlot();
}

// ═══════════════════════════════════════════════════════════════════
//  SLOT CLAIM — the fix: no host, just claim first free slot
// ═══════════════════════════════════════════════════════════════════
async function claimSlot() {
  for (let attempt = 0; attempt < 3; attempt++) {          // up to 3 full passes
    for (let i = 0; i < MAX_SLOTS; i++) {
      setConn('JOINING', `Trying slot ${i+1} of ${MAX_SLOTS}…`);
      const id  = slotId(roomCode, i);
      const res = await tryOpen(id);

      if (res === 'ok') {
        mySlot = i;
        myPeer = window.__claimedPeer;
        window.__claimedPeer = null;
        startApp();
        return;
      }
      // 'taken' or timeout → try next slot
    }
    if (attempt < 2) {
      setConn('RETRYING', 'Waiting for a free slot…');
      await sleep(2000);
    }
  }
  toast('⚠️ Channel full (8 users). Please try again later.');
  document.getElementById('connecting').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
}

function tryOpen(id) {
  return new Promise(resolve => {
    let done = false;
    const fin = v => { if (!done) { done = true; resolve(v); } };
    const p = new Peer(id, { debug: 0 });
    p.on('open', () => { window.__claimedPeer = p; fin('ok'); });
    p.on('error', err => {
      p.destroy();
      fin( (err.type === 'unavailable-id' || err.type === 'peer-unavailable') ? 'taken' : 'error' );
    });
    setTimeout(() => { if (!done) { p.destroy(); fin('taken'); } }, 7000);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════════════════════════
function startApp() {
  document.getElementById('connecting').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('r-code').textContent   = roomCode;
  document.getElementById('slot-info').textContent = `Slot ${mySlot+1} / ${MAX_SLOTS}`;
  setStatus('ONLINE', 'ok');
  renderMembers();

  // Incoming data connections
  myPeer.on('connection', dc => {
    const sn = parseSlot(dc.peer);
    if (sn === null) return;
    dc.on('open',  () => {
      ensure(sn).dc = dc;
      trySend(sn, { type: 'hello', name: myName });
    });
    dc.on('data',  d  => onMsg(sn, d));
    dc.on('close', () => dropPeer(sn));
    dc.on('error', () => dropPeer(sn));
  });

  // Incoming calls
  myPeer.on('call', call => {
    call.answer(getSilent());
    const sn = parseSlot(call.peer);
    if (sn === null) return;
    ensure(sn).ic = call;
    call.on('stream', s => attachAudio(sn, s));
    call.on('close',  () => { if (peers[sn]) peers[sn].ic = null; });
  });

  myPeer.on('disconnected', () => {
    setStatus('RECONNECTING', 'warn');
    setTimeout(() => { try { myPeer.reconnect(); } catch(e) {} }, 1500);
  });

  myPeer.on('error', err => {
    if (err.type === 'peer-unavailable') return; // empty slot — normal, ignore
    setStatus('ERROR', 'err');
    toast('⚠️ ' + err.type);
  });

  initAudio();
  scanPeers();
  scanInterval = setInterval(scanPeers, SCAN_MS);
}

// ═══════════════════════════════════════════════════════════════════
//  PEER DISCOVERY
// ═══════════════════════════════════════════════════════════════════
function scanPeers() {
  for (let i = 0; i < MAX_SLOTS; i++) {
    if (i === mySlot) continue;
    const p = peers[i];
    if (p && p.dc && p.dc.open) continue; // already connected
    connectSlot(i);
  }
}

function connectSlot(sn) {
  const id = slotId(roomCode, sn);
  try {
    const dc = myPeer.connect(id, { reliable: true });
    dc.on('open', () => {
      ensure(sn).dc = dc;
      trySend(sn, { type: 'hello', name: myName });
      callSlot(sn, id);
    });
    dc.on('data',  d  => onMsg(sn, d));
    dc.on('close', () => dropPeer(sn));
    dc.on('error', () => { /* slot empty — silent */ });
  } catch(e) {}
}

function callSlot(sn, id) {
  if (peers[sn] && peers[sn].oc) return;
  try {
    const call = myPeer.call(id, getSilent());
    ensure(sn).oc = call;
    call.on('stream', s => attachAudio(sn, s));
    call.on('close',  () => { if (peers[sn]) peers[sn].oc = null; });
  } catch(e) {}
}

function parseSlot(peerId) {
  const pfx = `${PREFIX}-${roomCode}-s`;
  if (!peerId.startsWith(pfx)) return null;
  const n = parseInt(peerId.slice(pfx.length), 10);
  return isNaN(n) ? null : n;
}

function ensure(sn) {
  if (!peers[sn]) peers[sn] = {};
  return peers[sn];
}

function trySend(sn, data) {
  try { if (peers[sn] && peers[sn].dc && peers[sn].dc.open) peers[sn].dc.send(data); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════
//  MESSAGING
// ═══════════════════════════════════════════════════════════════════
function onMsg(sn, data) {
  switch (data.type) {
    case 'hello':
      const isNew = !peers[sn] || !peers[sn].name;
      ensure(sn).name = data.name;
      if (isNew && data.name) toast(`📡 ${data.name} joined`);
      renderMembers();
      break;
    case 'tx':
      const p = ensure(sn);
      p.speaking = true;
      clearTimeout(p.speakT);
      p.speakT = setTimeout(() => { if (peers[sn]) { peers[sn].speaking = false; renderMembers(); } }, 900);
      renderMembers();
      break;
    case 'bye':
      dropPeer(sn);
      break;
  }
}

function dropPeer(sn) {
  const p = peers[sn];
  if (p) {
    if (p.audioEl) { try { p.audioEl.srcObject = null; p.audioEl.remove(); } catch(e){} }
    try { if (p.oc) p.oc.close(); } catch(e){}
    try { if (p.ic) p.ic.close(); } catch(e){}
    if (p.name) toast(`📴 ${p.name} left`);
    delete peers[sn];
  }
  if (selSlot === sn) { selSlot = null; updateTarget(); }
  renderMembers();
}

// ═══════════════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════════════
function getSilent() {
  if (silentStream) return silentStream;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const dst = ctx.createMediaStreamDestination();
  const osc = ctx.createOscillator(); osc.frequency.value = 0; osc.connect(dst); osc.start();
  silentStream = dst.stream; return silentStream;
}

async function initAudio() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    setupAnalyser();
  } catch(e) {
    toast('⚠️ Mic permission needed — tap 🎙 to retry.');
  }
}

async function ensureMic() {
  if (localStream) return true;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    setupAnalyser();
    return true;
  } catch(e) {
    toast('⚠️ Microphone access denied');
    return false;
  }
}

function setupAnalyser() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
  }
  try { audioCtx.createMediaStreamSource(localStream).connect(analyser); } catch(e){}
  if (!meterRunning) runMeter();
}

function attachAudio(sn, stream) {
  const p = ensure(sn);
  if (p.audioEl) { try { p.audioEl.srcObject = null; p.audioEl.remove(); } catch(e){} }
  const a = document.createElement('audio');
  a.srcObject = stream; a.autoplay = true; a.playsInline = true;
  document.body.appendChild(a); p.audioEl = a;
}

// ═══════════════════════════════════════════════════════════════════
//  PTT
// ═══════════════════════════════════════════════════════════════════
function pttDown(e) { e.preventDefault(); if (!talking) startTX(); }
function pttUp(e)   { e.preventDefault(); if (!voxOn)   stopTX();  }

async function startTX() {
  if (talking) return;
  if (!(await ensureMic())) return;
  talking = true;
  document.getElementById('ptt-btn').classList.add('live');
  document.getElementById('tx-badge').classList.add('on');
  document.getElementById('ptt-hint').textContent = 'TRANSMITTING…';

  const track = localStream.getAudioTracks()[0];
  Object.entries(peers).forEach(([sn, p]) => {
    if (selSlot !== null && parseInt(sn) !== selSlot) return;
    replaceTrack(p.oc, track);
    replaceTrack(p.ic, track);
  });
  Object.entries(peers).forEach(([sn]) => trySend(parseInt(sn), { type: 'tx' }));
}

function stopTX() {
  if (!talking) return;
  talking = false;
  document.getElementById('ptt-btn').classList.remove('live');
  document.getElementById('tx-badge').classList.remove('on');
  document.getElementById('ptt-hint').textContent = 'HOLD TO TALK';
  const silent = getSilent().getAudioTracks()[0];
  Object.values(peers).forEach(p => { replaceTrack(p.oc, silent); replaceTrack(p.ic, silent); });
}

function replaceTrack(call, track) {
  if (!call || !call.peerConnection || !track) return;
  const s = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
  if (s) s.replaceTrack(track).catch(() => {});
}

// ═══════════════════════════════════════════════════════════════════
//  VOX
// ═══════════════════════════════════════════════════════════════════
function toggleVox() {
  voxOn = !voxOn;
  document.getElementById('vox-card').classList.toggle('on', voxOn);
  if (voxOn) ensureMic();
  if (!voxOn && talking) stopTX();
}

function runMeter() {
  meterRunning = true;
  const data = new Uint8Array(analyser.frequencyBinCount);
  const VOX  = 30;
  (function loop() {
    analyser.getByteFrequencyData(data);
    const avg  = data.slice(0, 48).reduce((a,v) => a+v, 0) / 48;
    const norm = Math.min(avg / 80, 1);
    BARS.forEach(b => {
      b.style.height     = Math.max(2, norm * 16 * (0.35 + Math.random() * 0.75)) + 'px';
      b.style.background = norm > 0.28 ? 'var(--amber)' : 'var(--border)';
    });
    if (voxOn) {
      if (avg > VOX && !talking) { startTX(); }
      else if (avg <= VOX && talking) { clearTimeout(voxHoldT); voxHoldT = setTimeout(stopTX, 700); }
    }
    requestAnimationFrame(loop);
  })();
}

// ═══════════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════════
function setMode(mode) {
  document.getElementById('tab-grp').className = 'ch-tab' + (mode==='group' ? ' active' : '');
  document.getElementById('tab-ind').className = 'ch-tab' + (mode==='individual' ? ' active' : '');
  if (mode === 'group') { selSlot = null; document.getElementById('ptt-target').textContent = '📢 ALL MEMBERS'; }
  else updateTarget();
  renderMembers();
}

function selectMember(sn) {
  if (!document.getElementById('tab-ind').classList.contains('active')) return;
  selSlot = sn; updateTarget(); renderMembers();
}

function updateTarget() {
  if (!document.getElementById('tab-ind').classList.contains('active')) return;
  document.getElementById('ptt-target').textContent =
    (selSlot !== null && peers[selSlot] && peers[selSlot].name)
      ? `👤 ${esc(peers[selSlot].name)}`
      : '👆 Tap a member below';
}

function renderMembers() {
  const indMode = document.getElementById('tab-ind').classList.contains('active');
  const named   = Object.entries(peers).filter(([,p]) => p.name);
  document.getElementById('m-count').textContent = `${named.length + 1} online`;

  let html = `<div class="member-row">
    <div class="avatar">${esc(myName[0]||'?').toUpperCase()}<div class="av-ring"></div></div>
    <div class="m-name">${esc(myName)}</div>
    <span class="m-tag">YOU · S${mySlot+1}</span>
  </div>`;

  if (!named.length) {
    html += `<div class="empty-state">No one else yet.<br>Share the channel name:<br><strong>${esc(roomCode)}</strong></div>`;
  } else {
    named.forEach(([sn, p]) => {
      const isn = parseInt(sn), sel = isn === selSlot;
      html += `<div class="member-row${sel?' sel':''}${p.speaking?' tx':''}" onclick="selectMember(${isn})">
        <div class="avatar">${esc((p.name||'?')[0]).toUpperCase()}<div class="av-ring"></div></div>
        <div class="m-name">${esc(p.name)}</div>
        ${p.speaking ? '<span class="m-tx">◉ TX</span>'
          : (indMode && sel ? '<span class="m-tag">SELECTED</span>' : `<span class="m-tag">S${isn+1}</span>`)}
      </div>`;
    });
  }
  document.getElementById('m-list').innerHTML = html;
}

function copyLink() {
  const url = `${location.origin}${location.pathname}?ch=${encodeURIComponent(roomCode)}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.innerHTML = '📋 Invite'; btn.classList.remove('ok'); }, 2200);
  }).catch(() => toast(`Channel name: ${roomCode}`));
}

// ═══════════════════════════════════════════════════════════════════
//  CLEANUP
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('beforeunload', () => {
  clearInterval(scanInterval);
  Object.entries(peers).forEach(([sn]) => trySend(parseInt(sn), { type:'bye' }));
  if (myPeer) try { myPeer.destroy(); } catch(e){}
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (audioCtx) try { audioCtx.close(); } catch(e){}
});

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
(function init() {
  loadSaved();
  const ch = new URLSearchParams(location.search).get('ch');
  if (ch) {
    document.getElementById('ch-input').value = decodeURIComponent(ch).toLowerCase();
    toast('📡 Channel loaded — enter your name and join!');
  }
})();
</script>
