<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AR→EN">
<title>Arabic → English Live</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080a0d;--card:#0f1218;--border:#1c2130;
  --gold:#d4a853;--blue:#5ba3c9;--green:#3dd68c;
  --red:#e05c5c;--text:#e6e0d6;--dim:#3a4255;--muted:#1a1f2a;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(212,168,83,.07),transparent 60%),
             radial-gradient(ellipse 50% 40% at 90% 100%,rgba(91,163,201,.06),transparent 60%);
  pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;
  padding:env(safe-area-inset-top,14px) 0 env(safe-area-inset-bottom,0)}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:-.3px}
.brand .ar{font-family:'Noto Naskh Arabic',serif;font-size:11px;color:var(--blue);direction:rtl;margin-top:2px}
.badge{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  border:1px solid var(--border);background:var(--card);font-size:9px;font-weight:700;
  letter-spacing:1.5px;color:var(--dim);transition:all .3s;white-space:nowrap}
.badge.on{border-color:rgba(61,214,140,.45);color:var(--green)}
.badge.busy{border-color:rgba(212,168,83,.45);color:var(--gold)}
.badge.err{border-color:rgba(224,92,92,.45);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge.on .dot{animation:pulse 1.3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* VIZ */
.viz-wrap{margin:2px 18px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 12px 8px;flex-shrink:0}
.bars{display:flex;align-items:center;gap:2px;height:26px;margin-bottom:7px}
.b{flex:1;border-radius:2px;background:var(--blue);opacity:.18;height:3px;transition:height .06s,opacity .06s}
.b.on{opacity:.8}
.ar-live{font-family:'Noto Naskh Arabic',serif;font-size:15px;direction:rtl;text-align:right;
  color:rgba(212,168,83,.7);min-height:22px;line-height:1.5;word-break:break-word;
  max-height:52px;overflow:hidden}

/* TRANSLATION */
.trans-wrap{flex:1;margin:0 18px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel-hd{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-hd .lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.chip-en{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:5px;
  background:rgba(212,168,83,.12);color:var(--gold)}
.trans-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 10px}
.trans-scroll::-webkit-scrollbar{display:none}
#trans-text{font-size:20px;font-weight:300;line-height:1.65;color:var(--text);word-break:break-word;min-height:60px}
.ph{font-size:14px;color:var(--dim);font-weight:300}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cursor{display:inline-block;width:2px;height:.85em;background:var(--gold);
  margin-left:2px;vertical-align:middle;animation:blink .85s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* HISTORY */
.hist-wrap{margin:0 18px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;flex-shrink:0;max-height:26vh;display:flex;flex-direction:column}
.hist-hd{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.hist-hd .lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.clr-btn{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:5px;
  background:rgba(91,163,201,.1);color:var(--blue);cursor:pointer;border:none;font-family:'Sora',sans-serif}
.hist-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.hist-list::-webkit-scrollbar{display:none}
.hi{padding:8px 12px;border-bottom:1px solid var(--border);animation:fadeUp .3s ease}
.hi:last-child{border-bottom:none}
.hi-ar{font-family:'Noto Naskh Arabic',serif;font-size:12px;direction:rtl;text-align:right;
  color:var(--blue);line-height:1.5;margin-bottom:2px}
.hi-en{font-size:11px;color:var(--text);line-height:1.45;opacity:.8}
.hi-empty{padding:14px;font-size:11px;color:var(--dim);text-align:center}

/* CONTROLS */
.controls{flex-shrink:0;padding:4px 18px calc(env(safe-area-inset-bottom,0px) + 10px);display:flex;gap:10px}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px 10px;border-radius:13px;border:none;font-family:'Sora',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:transform .15s}
.btn:active{transform:scale(.95)}
.btn-go{background:linear-gradient(135deg,#1d5c3a,#3dd68c18);border:1px solid rgba(61,214,140,.4);color:var(--green)}
.btn-stop{background:linear-gradient(135deg,#5c1d1d,#e05c5c18);border:1px solid rgba(224,92,92,.4);color:var(--red);display:none}
.btn-clr{flex:0 0 46px;background:var(--muted);border:1px solid var(--border);color:var(--dim);border-radius:13px}
.btn-clr:active{color:var(--gold);border-color:var(--gold)}
.err-bar{display:none;margin:0 18px 6px;padding:9px 12px;
  background:rgba(224,92,92,.08);border:1px solid rgba(224,92,92,.25);
  border-radius:10px;font-size:11px;color:var(--red);line-height:1.5;flex-shrink:0}
.foot{text-align:center;font-size:9px;letter-spacing:2px;color:#1e2535;padding:2px 0 3px;flex-shrink:0}
.foot b{color:rgba(212,168,83,.35)}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <h1>Arabic → English</h1>
      <div class="ar">مترجم فوري مباشر</div>
    </div>
    <div class="badge" id="badge"><div class="dot"></div><span id="badge-txt">IDLE</span></div>
  </div>

  <div class="viz-wrap">
    <div class="bars" id="bars"></div>
    <div class="ar-live" id="ar-live">…</div>
  </div>

  <div class="trans-wrap">
    <div class="panel-hd">
      <span class="lbl">Live Translation</span>
      <span class="chip-en">EN</span>
    </div>
    <div class="trans-scroll" id="trans-scroll">
      <div id="trans-text"><span class="ph">Speak Arabic — translation streams here…</span></div>
    </div>
  </div>

  <div class="hist-wrap">
    <div class="hist-hd">
      <span class="lbl">History</span>
      <button class="clr-btn" onclick="clearHist()">CLEAR</button>
    </div>
    <div class="hist-list" id="hist-list"><div class="hi-empty">No phrases yet</div></div>
  </div>

  <div class="err-bar" id="err-bar"></div>

  <div class="controls">
    <button class="btn btn-go" id="btn-go" onclick="startListening()">🎙 Start Listening</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopListening()">⏹ Stop</button>
    <button class="btn btn-clr" onclick="clearAll()">↺</button>
  </div>

  <div class="foot"><b>SDMBRK COLLECTIONS</b></div>
</div>

<script>
// ── BARS ─────────────────────────────────────────────────────────
const barsEl = document.getElementById('bars');
const BC = 52;
const barEls = Array.from({length:BC},()=>{const b=document.createElement('div');b.className='b';barsEl.appendChild(b);return b;});
let audioCtx,analyser,micStream,raf;

async function startViz(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=128;
    src.connect(analyser);drawBars();
  }catch(e){}
}
function drawBars(){
  raf=requestAnimationFrame(drawBars);
  if(!analyser)return;
  const d=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  barEls.forEach((b,i)=>{const v=d[Math.floor(i*d.length/BC)]||0;b.style.height=Math.max(3,(v/255)*24)+'px';b.classList.toggle('on',v>15);});
}
function stopViz(){
  cancelAnimationFrame(raf);
  barEls.forEach(b=>{b.style.height='3px';b.classList.remove('on');});
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close().catch(()=>{});
  audioCtx=analyser=micStream=null;
}

// ── STATE ─────────────────────────────────────────────────────────
let recognition=null, isListening=false;
let history=[];
let debounceTimer=null;
let isTranslating=false;
let lastSentArabic='';
let pendingArabic='';
let fullFinal='';   // accumulated final results this session
const DEBOUNCE=800; // ms after last speech change → fire translation

// ── UI ────────────────────────────────────────────────────────────
function badge(type,txt){
  const b=document.getElementById('badge');
  b.className='badge'+(type?' '+type:'');
  document.getElementById('badge-txt').textContent=txt;
}
function setAr(t){document.getElementById('ar-live').textContent=t||'…';}
function setEn(t,anim){
  const el=document.getElementById('trans-text');
  if(!t){el.innerHTML='<span class="ph">Speak Arabic — translation streams here…</span>';return;}
  el.innerHTML=(anim?`<span style="animation:fadeUp .35s ease">`:`<span>`)+t+'</span><span class="cursor"></span>';
  const sc=document.getElementById('trans-scroll');
  sc.scrollTop=sc.scrollHeight;
}
function showErr(m){const e=document.getElementById('err-bar');e.textContent=m;e.style.display=m?'block':'none';}
function clearHist(){history=[];document.getElementById('hist-list').innerHTML='<div class="hi-empty">No phrases yet</div>';}
function clearAll(){clearHist();setEn('');setAr('');fullFinal='';lastSentArabic='';pendingArabic='';}
function pushHistory(ar,en){
  history.unshift({ar,en});
  document.getElementById('hist-list').innerHTML=history.slice(0,30).map(h=>
    `<div class="hi"><div class="hi-ar">${h.ar}</div><div class="hi-en">${h.en}</div></div>`
  ).join('');
}

// ── TRANSLATE ─────────────────────────────────────────────────────
async function callTranslate(arabicText){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:600,
      system:'You are a real-time Arabic-to-English interpreter. Translate the Arabic text to natural fluent English. Output ONLY the English translation — nothing else.',
      messages:[{role:'user',content:arabicText}]
    })
  });
  const data=await res.json();
  return data?.content?.[0]?.text?.trim()||null;
}

// Main translation loop — debounced so it fires 800ms after speech pauses
function scheduleTranslate(arabic){
  pendingArabic=arabic;
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>fireTranslate(arabic), DEBOUNCE);
}

async function fireTranslate(arabic){
  if(!arabic||arabic===lastSentArabic)return;
  if(isTranslating){
    // Will retry after current finishes
    return;
  }
  isTranslating=true;
  lastSentArabic=arabic;
  badge('busy','TRANSLATING');
  try{
    const eng=await callTranslate(arabic);
    if(eng){
      setEn(eng, true);
    }
    if(isListening) badge('on','LISTENING');
  }catch(e){
    showErr('Translation error — check connection.');
    badge('err','ERROR');
  }finally{
    isTranslating=false;
    // If new speech came while we were busy, translate it now
    if(pendingArabic && pendingArabic!==lastSentArabic){
      fireTranslate(pendingArabic);
    }
  }
}

// ── SPEECH RECOGNITION ───────────────────────────────────────────
function buildRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='ar-SA';
  r.continuous=true;
  r.interimResults=true;
  r.maxAlternatives=1;

  r.onstart=()=>{badge('on','LISTENING');showErr('');};
  r.onend=()=>{if(isListening)setTimeout(()=>{try{r.start();}catch(e){}},200);};
  r.onerror=(e)=>{
    if(e.error==='no-speech')return;
    if(e.error==='not-allowed'||e.error==='denied'){
      showErr('Mic denied. Tap the lock/mic icon in your browser bar → Allow microphone → try again.');
      badge('err','MIC DENIED');stopListening();return;
    }
  };

  r.onresult=(event)=>{
    let interim='';
    let newFinals='';

    for(let i=event.resultIndex;i<event.results.length;i++){
      const t=event.results[i][0].transcript;
      if(event.results[i].isFinal){
        newFinals+=t+' ';
      } else {
        interim+=t;
      }
    }

    // Accumulate finals
    if(newFinals.trim()){
      fullFinal+=(fullFinal?' ':'')+newFinals.trim();
    }

    // Current display = everything confirmed + what's being said right now
    const combined=(fullFinal+(interim?' '+interim:'')).trim();

    if(combined){
      setAr(combined);
      // Fire translation — debounce keeps it from hammering the API
      scheduleTranslate(combined);
    }

    // When a final chunk completes, save to history (async, non-blocking)
    if(newFinals.trim()){
      const chunk=newFinals.trim();
      (async()=>{
        try{
          const eng=await callTranslate(chunk);
          if(eng) pushHistory(chunk, eng);
        }catch(e){}
      })();
    }
  };

  return r;
}

function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showErr('Use Chrome on Android or Safari on iPhone.');badge('err','NOT SUPPORTED');return;}
  fullFinal=''; lastSentArabic=''; pendingArabic='';
  isListening=true;
  recognition=buildRec();
  try{recognition.start();}catch(e){}
  startViz();
  document.getElementById('btn-go').style.display='none';
  document.getElementById('btn-stop').style.display='flex';
}

function stopListening(){
  isListening=false;
  clearTimeout(debounceTimer);
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  stopViz();
  badge('','IDLE');
  document.getElementById('btn-go').style.display='flex';
  document.getElementById('btn-stop').style.display='none';
}
</script>
</body>
</html>
